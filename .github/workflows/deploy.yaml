name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: vanya
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3116
          script: |
            cd /home/vanya/catty-reminders-app
            git fetch origin
            git reset --hard ${{ github.sha }}
            echo "DEPLOY_REF=${{ github.sha }}" > /home/vanya/catty-reminders-app/.env
            sudo systemctl restart catty-app
